<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Virtual Assistant Agency Dashboard</title>
    <link rel="icon" type="image/png" href="assets/images/logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/footer.css">
    <link rel="stylesheet" href="assets/css/dark-mode.css">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: var(--surface-color);
            padding: 2rem 1rem;
        }

        .auth-card {
            width: 100%;
            max-width: 450px;
            background-color: var(--bg-color);
            padding: var(--space-6) var(--space-4);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border-color);
        }

        .login-logo {
            margin-bottom: 2.5rem;
            display: flex;
            justify-content: center;
        }
    </style>
</head>

<body>
    <div class="auth-container">
        <div class="login-logo" style="display: flex; align-items: center; justify-content: center; gap: 1rem; width: 100%; max-width: 500px; margin-left: auto; margin-right: auto;">
            <a href="index.html" class="nav-logo" style="font-size: 1.5rem; margin-bottom: 0;">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polygon points="12 2 2 7 12 12 22 7 12 2" />
                    <polyline points="2 17 12 22 22 17" />
                    <polyline points="2 12 12 17 22 12" />
                </svg>
                Virtual Assistant Agency
            </a>
            <div class="flex items-center gap-2">
                <button id="theme-toggle" class="btn btn-secondary" style="padding: 0.5rem; border: none;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                </button>
            </div>
        </div>
        <div class="auth-card">
            <div style="text-align: center; margin-bottom: 32px;">
                <h1 style="font-size: 1.5rem; margin-bottom: 8px;">Create your account</h1>
                <p style="font-size: 0.875rem;">Start delegating tasks to world-class assistants.</p>
            </div>

            <form action="dashboard.html" method="GET">
                <div class="grid grid-cols-2 gap-2">
                    <div class="form-group">
                        <label class="form-label" for="firstName">First name</label>
                        <input class="form-control" type="text" id="firstName" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="lastName">Last name</label>
                        <input class="form-control" type="text" id="lastName" required>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="email">Work Email</label>
                    <input class="form-control" type="email" id="email" required placeholder="name@company.com">
                </div>

                <div class="form-group" style="margin-bottom: 24px;">
                    <label class="form-label" for="password">Password</label>
                    <input class="form-control" type="password" id="password" required>
                    <p style="font-size: 0.75rem; color: var(--text-tertiary); margin-top: 4px; margin-bottom: 0;">Must
                        be at least 8 characters long.</p>
                </div>

                <div class="form-group" style="display: flex; gap: 8px; align-items: flex-start; margin-bottom: 24px;">
                    <input type="checkbox" id="terms" required style="margin-top: 4px;">
                    <label for="terms" style="font-size: 0.875rem; color: var(--text-secondary); line-height: 1.4;">
                        I agree to the <a href="#" style="color: var(--primary-color);">Terms of Service</a> and <a
                            href="#" style="color: var(--primary-color);">Privacy Policy</a>.
                    </label>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; margin-bottom: 16px;">Create
                    Account</button>
            </form>

            <div style="text-align: center; font-size: 0.875rem; color: var(--text-secondary);">
                Already have an account? <a href="login.html" style="color: var(--primary-color); font-weight: 500;">Log
                    in</a>
            </div>
        </div>
    </div>

    <script src="assets/js/main.js"></script>
</body>
</html>
