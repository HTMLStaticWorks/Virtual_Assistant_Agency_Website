<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Virtual Assistant Agency Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/dark-mode.css">
    <style>
        .auth-container {
            min-height: calc(100vh - 4rem - 100px);
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--surface-color);
            padding: 4rem 1rem;
        }

        .auth-card {
            width: 100%;
            max-width: 450px;
            background-color: var(--bg-color);
            padding: var(--space-6) var(--space-4);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border-color);
        }
    </style>
</head>

<body>
    <!-- Header / Navbar -->
    <header class="navbar">
        <div class="container nav-container">
            <a href="index.html" class="nav-logo">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polygon points="12 2 2 7 12 12 22 7 12 2" />
                    <polyline points="2 17 12 22 22 17" />
                    <polyline points="2 12 12 17 22 12" />
                </svg>
                Virtual Assistant Agency
            </a>

            <nav class="nav-links">
                <a href="index.html">Home</a>
                <a href="home-2.html">Home 2</a>
                <a href="about.html">About</a>
                <a href="services.html">Services</a>
                <a href="pricing.html">Pricing</a>
                <a href="dashboard.html" class="btn-nav-dashboard">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line></svg>
                    Dashboard
                </a>
                <a href="login.html" class="btn btn-secondary">Login</a>
                <a href="signup.html" class="btn btn-primary">Hire a VA</a>
            </nav>

            <div class="flex items-center gap-2">
                <button id="theme-toggle" class="btn btn-secondary" style="padding: 0.5rem; border: none;"
                    aria-label="Toggle dark mode">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
                    </svg>
                </button>
                <button class="mobile-menu-btn" aria-label="Toggle menu" aria-expanded="false">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="3" y1="12" x2="21" y2="12" />
                        <line x1="3" y1="6" x2="21" y2="6" />
                        <line x1="3" y1="18" x2="21" y2="18" />
                    </svg>
                </button>
            </div>
        </div>
    </header>

    <div class="auth-container">
        <div class="auth-card">
            <div style="text-align: center; margin-bottom: 32px;">
                <h1 style="font-size: 1.5rem; margin-bottom: 8px;">Create your account</h1>
                <p style="font-size: 0.875rem;">Start delegating tasks to world-class assistants.</p>
            </div>

            <form action="dashboard.html" method="GET">
                <div class="grid grid-cols-2 gap-2">
                    <div class="form-group">
                        <label class="form-label" for="firstName">First name</label>
                        <input class="form-control" type="text" id="firstName" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="lastName">Last name</label>
                        <input class="form-control" type="text" id="lastName" required>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="email">Work Email</label>
                    <input class="form-control" type="email" id="email" required placeholder="name@company.com">
                </div>

                <div class="form-group" style="margin-bottom: 24px;">
                    <label class="form-label" for="password">Password</label>
                    <input class="form-control" type="password" id="password" required>
                    <p style="font-size: 0.75rem; color: var(--text-tertiary); margin-top: 4px; margin-bottom: 0;">Must
                        be at least 8 characters long.</p>
                </div>

                <div class="form-group" style="display: flex; gap: 8px; align-items: flex-start; margin-bottom: 24px;">
                    <input type="checkbox" id="terms" required style="margin-top: 4px;">
                    <label for="terms" style="font-size: 0.875rem; color: var(--text-secondary); line-height: 1.4;">
                        I agree to the <a href="#" style="color: var(--primary-color);">Terms of Service</a> and <a
                            href="#" style="color: var(--primary-color);">Privacy Policy</a>.
                    </label>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; margin-bottom: 16px;">Create
                    Account</button>
            </form>

            <div style="text-align: center; font-size: 0.875rem; color: var(--text-secondary);">
                Already have an account? <a href="login.html" style="color: var(--primary-color); font-weight: 500;">Log
                    in</a>
            </div>
        </div>
    </div>

    <div id="footer-placeholder"></div>
    <script src="assets/js/footer.js" defer></script>
    <script src="assets/js/main.js"></script>
</body>
</html>
