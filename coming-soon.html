<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon - Virtual Assistant Agency</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/footer.css">
    <link rel="stylesheet" href="assets/css/dark-mode.css">
    <style>
        .soon-container {
            min-height: calc(100vh - 4rem - 100px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            background-color: var(--bg-color);
            padding: 4rem 1rem;
        }
    </style>
</head>

<body>
    <!-- Header / Navbar -->
    <header class="navbar">
        <div class="container nav-container">
            <a href="index.html" class="nav-logo">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polygon points="12 2 2 7 12 12 22 7 12 2" />
                    <polyline points="2 17 12 22 22 17" />
                    <polyline points="2 12 12 17 22 12" />
                </svg>
                Virtual Assistant Agency
            </a>

            <nav class="nav-links">
                <a href="index.html">Home</a>
                <a href="home-2.html">Home 2</a>
                <a href="about.html">About</a>
                <a href="services.html">Services</a>
                <a href="pricing.html">Pricing</a>
                <a href="dashboard.html" class="btn-nav-dashboard">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                        <line x1="3" y1="9" x2="21" y2="9"></line>
                        <line x1="9" y1="21" x2="9" y2="9"></line>
                    </svg>
                    Dashboard
                </a>
                <a href="login.html" class="btn btn-secondary">Login</a>
                <a href="signup.html" class="btn btn-primary">Hire a VA</a>
            </nav>

            <div class="flex items-center gap-2">
                <button id="theme-toggle" class="btn btn-secondary" style="padding: 0.5rem; border: none;"
                    aria-label="Toggle dark mode">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
                    </svg>
                </button>
                <button class="mobile-menu-btn" aria-label="Toggle menu" aria-expanded="false">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="3" y1="12" x2="21" y2="12" />
                        <line x1="3" y1="6" x2="21" y2="6" />
                        <line x1="3" y1="18" x2="21" y2="18" />
                    </svg>
                </button>
            </div>
        </div>
    </header>

    <main class="soon-container container">
        <h1 style="margin-bottom: 24px;">Something awesome is coming.</h1>
        <p style="max-width: 600px; margin: 0 auto 32px; font-size: 1.125rem;">We're currently building our new client
            dashboard experience. Enter your email to get notified when we launch.</p>

        <form style="display: flex; gap: 8px; max-width: 400px; margin: 0 auto; width: 100%;">
            <input type="email" class="form-control" placeholder="Enter your email address" required style="flex: 1;">
            <button class="btn btn-primary" type="submit">Notify Me</button>
        </form>

        <a href="index.html" style="margin-top: 48px; color: var(--text-tertiary); font-size: 0.875rem;">&larr; Return
            to Homepage</a>
    </main>
    <div id="footer-placeholder"></div>
    <script src="assets/js/footer.js" defer></script>
    <script src="assets/js/main.js"></script>
</body>

</html>
