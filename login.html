<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In - Virtual Assistant Agency Dashboard</title>
    <link rel="icon" type="image/png" href="assets/images/logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/footer.css">
    <link rel="stylesheet" href="assets/css/dark-mode.css">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: var(--surface-color);
            padding: 2rem 1rem;
        }

        .auth-card {
            width: 100%;
            max-width: 400px;
            background-color: var(--bg-color);
            padding: var(--space-6) var(--space-4);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border-color);
        }

        .login-logo {
            margin-bottom: 2.5rem;
            display: flex;
            justify-content: center;
        }

        .social-divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 1.5rem 0;
            color: var(--text-tertiary);
            font-size: 0.8125rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .social-divider::before,
        .social-divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid var(--border-color);
        }

        .social-divider:not(:empty)::before {
            margin-right: 1rem;
        }

        .social-divider:not(:empty)::after {
            margin-left: 1rem;
        }

        .social-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .btn-social {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            padding: 0.75rem;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-social:hover {
            background-color: var(--surface-hover);
            border-color: var(--primary-color);
            transform: translateY(-1px);
        }
    </style>
</head>

<body>
    <div class="auth-container">
        <!-- Section 1: Brand & Logo -->
        <div class="login-logo" style="display: flex; align-items: center; justify-content: center; gap: 1rem;">
            <a href="index.html" class="nav-logo" style="font-size: 1.5rem;">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polygon points="12 2 2 7 12 12 22 7 12 2" />
                    <polyline points="2 17 12 22 22 17" />
                    <polyline points="2 12 12 17 22 12" />
                </svg> Virtual Assistant
            </a>
        </div>

        <!-- Section 2: Login Form -->
        <div class="auth-card">
            <div style="text-align: center; margin-bottom: 32px;">
                <h1 style="font-size: 1.5rem; margin-bottom: 8px;">Welcome back</h1>
                <p style="font-size: 0.875rem;">Log in to your client dashboard</p>
            </div>

            <form action="dashboard.html" method="GET">
                <div class="form-group">
                    <label class="form-label" for="email">Email address</label>
                    <input class="form-control" type="email" id="email" required placeholder="Enter your email">
                </div>

                <div class="form-group" style="margin-bottom: 24px;">
                    <div class="flex justify-between items-center" style="margin-bottom: var(--space-1);">
                        <label class="form-label" for="password" style="margin: 0;">Password</label>
                        <a href="forgot-password.html" style="font-size: 0.75rem; color: var(--primary-color);">Forgot password?</a>
                    </div>
                    <input class="form-control" type="password" id="password" required placeholder="Enter your password">
                </div>

                <div class="form-group" style="margin-bottom: 24px; display: flex; align-items: center; gap: 8px;">
                    <input type="checkbox" id="remember" style="width: auto; cursor: pointer;">
                    <label for="remember"
                        style="font-size: 0.875rem; color: var(--text-secondary); cursor: pointer; user-select: none;">Remember
                        me</label>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; margin-bottom: 16px;">Sign In</button>
            </form>

            <div class="social-divider">OR</div>

            <div class="social-buttons">
                <button class="btn-social">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 48 48">
                        <path fill="#FFC107" d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12c0-6.627,5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24c0,11.045,8.955,20,20,20c11.045,0,20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z"/>
                        <path fill="#FF3D00" d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z"/>
                        <path fill="#4CAF50" d="M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z"/>
                        <path fill="#1976D2" d="M43.611,20.083H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571l6.19,5.238C36.971,39.205,44,34,44,24C44,22.659,43.862,21.35,43.611,20.083z"/>
                    </svg>
                    Google
                </button>
                <button class="btn-social">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="#1877F2">
                        <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
                    </svg>
                    Facebook
                </button>
            </div>

            <div style="text-align: center; font-size: 0.875rem; color: var(--text-secondary);">
                Don't have an account? <a href="signup.html" style="color: var(--primary-color); font-weight: 500;">Sign
                    up</a>
            </div>
        </div>

    </div>

    <script src="assets/js/main.js"></script>
</body>

</html>
