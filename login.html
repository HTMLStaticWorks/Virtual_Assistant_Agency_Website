<!DOCTYPE html>
<html lang="en" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In - Virtual Assistant Agency Dashboard</title>
    <link rel="icon" type="image/png" href="assets/images/logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/footer.css">
    <link rel="stylesheet" href="assets/css/dark-mode.css">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: var(--surface-color);
            padding: 2rem 1rem;
        }

        .auth-card {
            width: 100%;
            max-width: 400px;
            background-color: var(--bg-color);
            padding: var(--space-6) var(--space-4);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border-color);
        }

        .login-logo {
            margin-bottom: 2.5rem;
            display: flex;
            justify-content: center;
        }
    </style>
</head>

<body>
    <div class="auth-container">
        <!-- Section 1: Brand & Logo -->
        <div class="login-logo" style="display: flex; align-items: center; justify-content: center; gap: 1rem;">
            <a href="index.html" class="nav-logo" style="font-size: 1.5rem;">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polygon points="12 2 2 7 12 12 22 7 12 2" />
                    <polyline points="2 17 12 22 22 17" />
                    <polyline points="2 12 12 17 22 12" />
                </svg>
                Virtual Assistant Agency
            </a>
            <button id="rtl-toggle">
                <span style="font-size: 0.75rem; font-weight: 700;">RTL</span>
            </button>
        </div>

        <!-- Section 2: Login Form -->
        <div class="auth-card">
            <div style="text-align: center; margin-bottom: 32px;">
                <h1 style="font-size: 1.5rem; margin-bottom: 8px;">Welcome back</h1>
                <p style="font-size: 0.875rem;">Log in to your client dashboard</p>
            </div>

            <form action="dashboard.html" method="GET">
                <div class="form-group">
                    <label class="form-label" for="email">Email address</label>
                    <input class="form-control" type="email" id="email" required placeholder="you@company.com">
                </div>

                <div class="form-group" style="margin-bottom: 24px;">
                    <div class="flex justify-between items-center" style="margin-bottom: var(--space-1);">
                        <label class="form-label" for="password" style="margin: 0;">Password</label>
                        <a href="forgot-password.html" style="font-size: 0.75rem; color: var(--primary-color);">Forgot password?</a>
                    </div>
                    <input class="form-control" type="password" id="password" required placeholder="••••••••">
                </div>

                <div class="form-group" style="margin-bottom: 24px; display: flex; align-items: center; gap: 8px;">
                    <input type="checkbox" id="remember" style="width: auto; cursor: pointer;">
                    <label for="remember"
                        style="font-size: 0.875rem; color: var(--text-secondary); cursor: pointer; user-select: none;">Remember
                        me</label>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; margin-bottom: 16px;">Sign In</button>
            </form>

            <div style="text-align: center; font-size: 0.875rem; color: var(--text-secondary);">
                Don't have an account? <a href="signup.html" style="color: var(--primary-color); font-weight: 500;">Sign
                    up</a>
            </div>
        </div>

    </div>

    <script src="assets/js/main.js"></script>
</body>

</html>
